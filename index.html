<!DOCTYPE html>
<html lang="en">

<head>
  <title>Shikshyalaya AI</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/material-design-iconic-font/2.1.2/css/material-design-iconic-font.min.css">
</head>

<body>
  <div class="chat-container">

    <div class="chat-header">
      <div class="header-inner">
        <div class="hdr-avatar">🎓</div>
        <div class="hdr-text">
          <div class="hdr-title">Shikshyalaya AI</div>
          <div class="hdr-sub">Powered by Groq AI · Lokanthali, Bhaktapur</div>
        </div>
        <div class="online-dot"></div>
        <button class="clear-btn" onclick="clearChat()" title="Clear chat">
          <i class="zmdi zmdi-delete"></i>
        </button>
      </div>
    </div>

    <div class="chat-messages" id="chat-messages">
      <div class="message bot">
        Namaste! 🙏 I'm the AI assistant for <b>Shikshyalaya College</b>. Ask me anything about our programs, admissions, fees, clubs, or facilities.
      </div>
      <div class="chip-row" id="chip-row">
        <button class="chip" onclick="chipSend('What programs are offered?')">📚 Programs</button>
        <button class="chip" onclick="chipSend('How to apply for admission?')">🏫 Admission</button>
        <button class="chip" onclick="chipSend('How to contact the college?')">📞 Contact</button>
        <button class="chip" onclick="chipSend('What are the fee details?')">💰 Fees</button>
      </div>
    </div>

    <div class="typing" id="typing-indicator">
      <div class="typing-dots">
        <span></span><span></span><span></span>
      </div>
      <span class="typing-text">Shikshyalaya AI is thinking…</span>
    </div>

    <div class="chat-input">
      <input type="text" id="user-input" placeholder="Ask anything about the college…" onkeypress="handleKeyPress(event)" autocomplete="off">
      <button id="send-btn" onclick="sendMessage()">
        <i class="zmdi zmdi-mail-send"></i>
      </button>
    </div>

  </div>
  <script src="script.js"></script>
</body>

</html>
