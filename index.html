<!DOCTYPE html>
<html lang="en">

<head>
    <title>Shikshyalaya AI</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/material-design-iconic-font/2.1.2/css/material-design-iconic-font.min.css">
</head>

<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="header-inner">
                <div class="hdr-avatar">🎓</div>
                <div class="hdr-text">
                    <div class="hdr-title">Shikshyalaya AI</div>
                    <div class="hdr-sub">Powered by Groq AI · Lokanthali, Bhaktapur</div>
                </div>
                <div class="online-dot"></div>
                <button class="clear-btn" onclick="clearChat()" title="Clear chat">
                    <i class="zmdi zmdi-delete"></i>
                </button>
            </div>
        </div>
        <div class="chat-messages" id="chat-messages">
            <div class="message bot">
                Namaste! 🙏 I am the AI assistant for Shikshyalaya College. Ask me about our CSIT, BBA, and MBA
                programs, admission details, or our facilities!
            </div>
            <!-- ADD this right after the first <div class="message bot">...</div> -->
            <div class="chip-row">
                <button class="chip"
                    onclick="document.getElementById('user-input').value='What programs are offered?'; sendMessage()">📚
                    Programs</button>
                <button class="chip"
                    onclick="document.getElementById('user-input').value='How to contact the college?'; sendMessage()">📞
                    Contact</button>
                <button class="chip"
                    onclick="document.getElementById('user-input').value='How to apply for admission?'; sendMessage()">🏫
                    Admission</button>
            </div>
        </div>

        <div class="typing" id="typing-indicator">AI is thinking...</div>

        <div class="chat-input">
            <input type="text" id="user-input" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
            <button id="send-btn" onclick="sendMessage()">
                <i class="zmdi zmdi-mail-send"></i>
            </button>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
