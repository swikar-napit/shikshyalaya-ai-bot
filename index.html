<!DOCTYPE html>
<html lang="en">
<head>
    <title>Shikshyalaya AI</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/material-design-iconic-font/2.1.2/css/material-design-iconic-font.min.css">
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        Shikshyalaya College AI
        <span>Powered by Gemini | Best College in Nepal</span>
    </div>
    
    <div class="chat-messages" id="chat-messages">
        <div class="message bot">
            Namaste! 🙏 I am the AI assistant for Shikshyalaya College. Ask me about our CSIT, BBA, and MBA programs, admission details, or our facilities!
        </div>
    </div>
    
    <div class="typing" id="typing-indicator">AI is thinking...</div>
    
    <div class="chat-input">
        <input type="text" id="user-input" placeholder="Ask about programs, contact, or clubs..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">&#10148;</button>
    </div>
</div>
    <script src="script.js"></script>
</body>
</html>
